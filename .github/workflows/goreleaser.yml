name: goreleaser

# Manual fallback — the primary release pipeline is release.yml (nightly cron).
# Use this workflow only if you need to re-run GoReleaser on an existing tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v0.8.1)'
        required: true
        type: string

permissions: read-all

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required: GoReleaser creates GitHub releases and uploads release artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Trigger docs version branch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.WORKFLOW_SYNC_TOKEN }}
          repository: kubestellar/docs
          event-type: create-version-branch
          client-payload: |
            {
              "project": "kubestellar-mcp",
              "version": "${{ github.event.inputs.tag }}",
              "source_repo": "kubestellar/kubestellar-mcp",
              "source_branch": "${{ github.event.inputs.tag }}"
            }
      - name: Trigger marketplace plugin update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.WORKFLOW_SYNC_TOKEN }}
          repository: kubestellar/claude-plugins
          event-type: update-plugin-version
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "source_repo": "kubestellar/klaude"
            }
