name: PR Verifier

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      checks: write
      pull-requests: read
    uses: kubestellar/infra/.github/workflows/reusable-pr-verifier.yml@main
