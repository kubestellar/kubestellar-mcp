name: PR Verifier

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions: read-all

jobs:
  verify-pr-title:
    name: Verify PR Title
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: read
      statuses: write
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allow an optional [actor] prefix (e.g. "[scanner] fix: …", "[quality] feat: …")
          # used by Hive automation agents before the conventional-commit type.
          # Pattern: optional [word-chars] prefix, then standard type(scope)?: subject.
          headerPattern: '^(?:\[[\w-]+\]\s+)?(\w*)(?:\(([\w$.\-*/ ]*)\))?!?:\s+(.*)$'
          headerPatternCorrespondence: 'type, scope, subject'
