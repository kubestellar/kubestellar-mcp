name: PR Verifier

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions: read-all

jobs:
  verify-pr-title:
    name: Verify PR Title
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: read
      statuses: write
    steps:
      - name: Check for automated PR prefix
        id: prefix-check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Detect automated agent prefixes like [scanner], [agent], etc.
          if echo "$PR_TITLE" | grep -qE '^\[(scanner|agent|ci-maintainer|quality|sec-check)\][[:space:]]+(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+'; then
            echo "is_automated=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_automated=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate automated PR title
        if: steps.prefix-check.outputs.is_automated == 'true'
        run: echo "Automated PR title matches expected pattern — OK."
      - name: Validate PR title (Conventional Commits)
        if: steps.prefix-check.outputs.is_automated == 'false'
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        with:
          subjectPatternError: |
            The PR title must follow Conventional Commits format.
            Automated PRs may use an optional prefix like [scanner] or [agent].
            Examples: "fix: correct typo", "[scanner] fix: pin SHA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
