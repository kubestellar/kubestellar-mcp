name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          THRESHOLD=$(cat .github/go-coverage-ratchet.txt)
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%  (ratchet: ${THRESHOLD}%)"
          if awk -v c="$COVERAGE" -v t="$THRESHOLD" 'BEGIN { exit !(c + 0 < t + 0) }'; then
            echo "::error::Coverage ${COVERAGE}% is below ratchet threshold ${THRESHOLD}%"
            echo "::error::Update .github/go-coverage-ratchet.txt if coverage legitimately decreased."
            exit 1
          fi
          # Auto-update ratchet if coverage improved
          if awk -v c="$COVERAGE" -v t="$THRESHOLD" 'BEGIN { exit !(c + 0 > t + 0) }'; then
            echo "Coverage improved to ${COVERAGE}% — update .github/go-coverage-ratchet.txt to lock in gains"
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          fail_ci_if_error: false

  validate-server-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate server.json schema
        run: |
          python3 << 'EOF'
          import json
          import sys

          try:
              with open('server.json', 'r') as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("ERROR: server.json not found")
              sys.exit(1)
          except json.JSONDecodeError as e:
              print(f"ERROR: Invalid JSON syntax: {e}")
              sys.exit(1)

          required_fields = ['name', 'version', 'packages', 'repository']
          missing_fields = [field for field in required_fields if field not in data]

          if missing_fields:
              print(f"ERROR: Missing required fields: {', '.join(missing_fields)}")
              sys.exit(1)

          print("server.json validation passed")
          print(f"  - name: {data['name']}")
          print(f"  - version: {data['version']}")
          print(f"  - packages count: {len(data['packages'])}")
          print(f"  - repository: {data['repository']}")
          EOF

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m
