name: OpenSSF Scorecard

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}  # deny all at top level; each job declares what it needs

jobs:
  analysis:
    permissions:
      security-events: write
      contents: read
      actions: read
      id-token: write
    uses: kubestellar/infra/.github/workflows/reusable-scorecard.yml@af322d48cc67ade7345cabc6a0ed55c6c7040ee4  # main
