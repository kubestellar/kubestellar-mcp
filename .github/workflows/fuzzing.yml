name: Fuzzing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run the fuzzer for a fixed duration every week to catch regressions.
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  fuzz:
    name: Go native fuzzing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz ValidateRepoURL (30 s)
        run: go test ./pkg/gitops/ -run='^$' -fuzz=FuzzValidateRepoURL -fuzztime=30s

      - name: Fuzz ValidateBranchName (30 s)
        run: go test ./pkg/gitops/ -run='^$' -fuzz=FuzzValidateBranchName -fuzztime=30s
