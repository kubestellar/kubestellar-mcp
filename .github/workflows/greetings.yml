name: Greetings

on:
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened, reopened]

permissions: read-all

jobs:
  greet:
    # Fork guard: restrict pull_request_target to same-repo PRs only.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      issues: write
      pull-requests: write
    uses: kubestellar/infra/.github/workflows/reusable-greetings.yml@1a04a3fd17771e78e5cf6d42a3fda84e3ba478f3 # pinned from main
    secrets: inherit
